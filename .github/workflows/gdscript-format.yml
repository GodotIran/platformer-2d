name: GDScript Format and Lint Check

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]

jobs:
  format-and-lint:
    name: Check GDScript formatting and linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GDScript formatter
        run: |
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          LATEST_URL=$(curl -s https://api.github.com/repos/gdquest/gdscript-formatter/releases/latest | jq -r '.assets[] | select(.name | test("linux.*x86_64")) | .browser_download_url' | head -1)
          curl -L -o gdscript-formatter.zip "$LATEST_URL"
          unzip -o gdscript-formatter.zip
          mv gdscript-formatter-* gdscript-formatter
          chmod +x gdscript-formatter
          mv gdscript-formatter "$HOME/.local/bin/"

      - name: Check formatting
        run: |
          find . -name "*.gd" -not -path "./addons/*" | xargs -r -n1 gdscript-formatter --check

      - name: Lint GDScript files
        run: |
          find . -name "*.gd" -not -path "./addons/*" | xargs -r -n1 gdscript-formatter lint --pretty
